# Respect flash partition layout (but code partition must start at 0)
CONFIG_USE_DT_CODE_PARTITION=y

# Kernel options
CONFIG_INIT_STACKS=y

CONFIG_POSIX_API=y

CONFIG_RTC=y

# Logging
CONFIG_LOG=y
#CONFIG_LOG_DEFAULT_LEVEL=0
CONFIG_PRINTK=y
# CONFIG_NET_LOG=y # ~10kB flash

# Generic networking options
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_ARP=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y

# IP address options
# 2 addresses so we can have a DHCP and an overridable static */
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=2
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_OPTION_CALLBACKS=y
CONFIG_NET_CONFIG_AUTO_INIT=y
#CONFIG_DNS_RESOLVER=y # This makes telnet console hang?
# Hostname will be registered with DHCP so if the network supports it,
# it will be the DNS name too. UNIQUE=y appends a random UUID to the
# end of HOSTNAME, you will need to watch the console to get this, or
# give yourself a unique hostname.
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="stm32-bmc"
CONFIG_NET_HOSTNAME_UNIQUE=y
# default / no-DHCP IP address
#CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.2.55"

# sys_reboot(), sys_poweroff()
CONFIG_REBOOT=y
CONFIG_POWEROFF=y

# `date set` does not set the RTC which would be confusing, so
# disable it. We supply `bmc time` commands.
CONFIG_DATE_SHELL=n
# local/network shell
CONFIG_KERNEL_SHELL=n # ~5kB flash
#CONFIG_SHELL_TAB=y
#CONFIG_NET_SHELL=y # ~40kB flash

# GPIO options
CONFIG_GPIO=y

### Storage ###
CONFIG_PERSISTENT_STORAGE=y

# Websocket default prompt (does not enable anything on it's own)
CONFIG_SHELL_WEBSOCKET_PROMPT="bmc:~$ "
