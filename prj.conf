CONFIG_PRINTK=y

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_ARP=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_OPTION_CALLBACKS=y
CONFIG_NET_CONFIG_AUTO_INIT=y
#CONFIG_DNS_RESOLVER=y # This makes telnet console hang?

CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_PKT_TX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=50

# Hostname will be registered with DHCP so if the network supports it,
# it will be the DNS name too. UNIQUE=y appends a random UUID to the
# end of HOSTNAME, you will need to watch the console to get this, or
# give yourself a unique hostname.
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="stm32-bmc"
CONFIG_NET_HOSTNAME_UNIQUE=y
# default / no-DHCP IP address
#CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.2.55"

CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_INIT_STACKS=y

#CONFIG_NET_BUF_LOG=y
#CONFIG_NET_LOG=y
CONFIG_LOG=y
#CONFIG_LOG_DEFAULT_LEVEL=0

CONFIG_NET_SHELL=y
CONFIG_KERNEL_SHELL=y
CONFIG_SHELL_BACKEND_TELNET=y
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=y
CONFIG_SHELL_TAB=y
