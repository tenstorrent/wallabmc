name: Build WallaBMC

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * 5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-spdx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX licenses
        uses: tenstorrent/tt-github-actions/.github/actions/spdx-checker@main
        with:
          verbose: 'true'
          ignore_config_file: .github/spdx-ignore.yaml

  build:
    needs: check-spdx

    runs-on: ubuntu-latest
    container:
      image: zephyrprojectrtos/ci:v0.28.9

    strategy:
      matrix:
        board: [nucleo_f767zi, hifive_premier_p550_mcu, qemu_cortex_m3]

    env:
      CMAKE_PREFIX_PATH: /opt/toolchains
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      BOARD: ${{ matrix.board }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wallabmc

      - name: Detect Zephyr SDK
        run: |
          SDK_PATH=$(find /opt/toolchains -maxdepth 1 -type d -name "zephyr-sdk-*" | head -n 1)
          if [ -z "$SDK_PATH" ]; then
            echo "Error: Could not find Zephyr SDK in /opt/toolchains"
            exit 1
          fi
          echo "ZEPHYR_SDK_INSTALL_DIR=$SDK_PATH" >> $GITHUB_ENV

      - name: Create Workspace Directory
        run: mkdir workspace

      - name: Cache West Modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: workspace
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('wallabmc/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-

      - name: Initialize West Workspace
        run: |
          cd workspace
          # Remove old .west config if it exists from cache to avoid conflicts
          rm -rf .west

          # Initialize using the wallabmc repo as the manifest
          west init -l ../wallabmc

          # Update modules (fetches Zephyr kernel, HAL_STM32, etc.)
          west update --narrow -o=--depth=10000 -o=--tags

      - name: Build WallaBMC (sysbuild boards)
        if: ${{ matrix.board != 'qemu_cortex_m3' }}
        working-directory: workspace
        run: |
          west build --sysbuild -p always -b $BOARD ../wallabmc
          mv build/mcuboot/zephyr/zephyr.hex build/mcuboot.hex
          mv build/mcuboot/zephyr/zephyr.bin build/mcuboot.bin
          mv build/mcuboot/zephyr/zephyr.elf build/mcuboot.elf
          mv build/wallabmc/zephyr/zephyr.hex build/wallabmc.hex
          mv build/wallabmc/zephyr/zephyr.bin build/wallabmc.bin
          mv build/wallabmc/zephyr/zephyr.elf build/wallabmc.elf
          mv build/wallabmc/zephyr/zephyr.signed.hex build/wallabmc.signed.hex
          mv build/wallabmc/zephyr/zephyr.signed.bin build/wallabmc.signed.bin

      - name: Build WallaBMC (QEMU image)
        if: ${{ matrix.board == 'qemu_cortex_m3' }}
        working-directory: workspace
        run: |
          # QEMU build does not do sysbuild
          west build -p always -b $BOARD ../wallabmc

      - name: Upload Board Firmware
        if: ${{ matrix.board != 'qemu_cortex_m3' }}
        uses: actions/upload-artifact@v4
        with:
          name: wallabmc-firmware-${{ matrix.board }}
          path: |
            workspace/build/mcuboot.hex
            workspace/build/mcuboot.bin
            workspace/build/mcuboot.elf
            workspace/build/wallabmc.hex
            workspace/build/wallabmc.bin
            workspace/build/wallabmc.elf
            workspace/build/wallabmc.signed.hex
            workspace/build/wallabmc.signed.bin

      - name: Upload QEMU Firmware
        if: ${{ matrix.board == 'qemu_cortex_m3' }}
        uses: actions/upload-artifact@v4
        with:
          name: wallabmc-firmware-${{ matrix.board }}
          path: |
            workspace/build/zephyr/zephyr.bin
            workspace/build/zephyr/zephyr.elf

  test:
    runs-on: ubuntu-latest

    needs: build
    if: needs.build.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wallabmc

      - name: Install Dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get install -qq telnet qemu-system-arm

      - name: Download QEMU Firmware
        uses: actions/download-artifact@v4
        with:
          name: wallabmc-firmware-qemu_cortex_m3
          path: firmware

      - name: Run QEMU Test
        run: |
          python3 wallabmc/scripts/run_qemu_ci.py firmware/zephyr.elf
